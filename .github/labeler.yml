backend:
  - changed-files:
      - any-glob-to-any-file: "backend/**"

frontend:
  - changed-files:
      - any-glob-to-any-file: "frontend/**"

infrastructure:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "docker-compose.yml"
          - ".env.example"
          - "backend/.env.example"
          - "frontend/.env.example"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "CONTRIBUTING.md"
          - "docs/**"
