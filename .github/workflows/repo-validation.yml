name: Repository Validation

on:
  workflow_call:
    inputs:
      run_deploy_readiness:
        description: Run the deploy-readiness gate in addition to CI checks.
        required: false
        default: false
        type: boolean

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Validate backend imports compile
        run: python -m compileall .

      - name: Run backend test suite
        run: pytest

  frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  infrastructure:
    name: Infrastructure Validation
    runs-on: ubuntu-latest
    env:
      REDIS_PASSWORD: ci-validation-password
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate repository deployment prerequisites
        run: python .github/scripts/validate_deploy.py

      - name: Validate Docker Compose configuration
        run: docker compose config

  deploy-readiness:
    name: Deploy Readiness
    if: ${{ inputs.run_deploy_readiness }}
    needs:
      - backend
      - frontend
      - infrastructure
    runs-on: ubuntu-latest
    env:
      REDIS_PASSWORD: ci-validation-password
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Smoke test FastAPI app import
        working-directory: backend
        run: python -c "from app_factory import create_app; app = create_app(); print(app.title)"

      - name: Smoke test worker import
        working-directory: backend
        run: python -c "import worker; print('worker import ok')"
