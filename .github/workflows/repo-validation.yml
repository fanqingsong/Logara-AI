name: Repository Validation

on:
  workflow_call:
    inputs:
      run_backend:
        description: Run backend validation jobs.
        required: false
        default: true
        type: boolean
      run_frontend:
        description: Run frontend validation jobs.
        required: false
        default: true
        type: boolean
      run_infrastructure:
        description: Run infrastructure validation jobs.
        required: false
        default: true
        type: boolean
      run_docker_builds:
        description: Build Docker images for backend and frontend.
        required: false
        default: false
        type: boolean
      run_integration_tests:
        description: Run live-service integration smoke tests.
        required: false
        default: false
        type: boolean
      collect_backend_coverage:
        description: Generate backend coverage output.
        required: false
        default: false
        type: boolean
      run_deploy_readiness:
        description: Run the deploy-readiness gate in addition to CI checks.
        required: false
        default: false
        type: boolean

jobs:
  backend:
    name: Backend Tests
    if: ${{ inputs.run_backend }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt pytest-cov

      - name: Compile Python files
        run: |
          python -m py_compile ./utils/redaction.py ./utils/timestamp.py ./worker.py

      - name: Run backend test suite
        if: ${{ !inputs.collect_backend_coverage }}
        run: pytest

      - name: Run backend tests with coverage
        if: ${{ inputs.collect_backend_coverage }}
        run: pytest --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload backend coverage report
        if: ${{ inputs.collect_backend_coverage }}
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml

  frontend:
    name: Frontend Quality
    if: ${{ inputs.run_frontend }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  infrastructure:
    name: Infrastructure Validation
    if: ${{ inputs.run_infrastructure }}
    runs-on: ubuntu-latest
    env:
      REDIS_PASSWORD: ci-validation-password
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Validate repository deployment prerequisites
        run: python .github/scripts/validate_deploy.py

      - name: Validate Docker Compose configuration
        run: docker compose config

  docker-builds:
    name: Docker Image Validation
    if: ${{ inputs.run_docker_builds }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: logara-ai-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: logara-ai-frontend:ci

  integration-smoke:
    name: Service Integration Smoke
    if: ${{ inputs.run_integration_tests }}
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd="bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=40s
    env:
      ENABLE_LIVE_SERVICE_TESTS: "1"
      REDIS_HOST: 127.0.0.1
      QDRANT_URL: http://127.0.0.1:6333
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run live-service health smoke test
        run: pytest tests/test_health_integration.py -m integration -q

  deploy-readiness:
    name: Deploy Readiness
    if: ${{ inputs.run_deploy_readiness }}
    needs:
      - backend
      - frontend
      - infrastructure
    runs-on: ubuntu-latest
    env:
      REDIS_PASSWORD: ci-validation-password
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Smoke test FastAPI app import
        working-directory: backend
        run: python -c "from app_factory import create_app; app = create_app(); print(app.title)"

      - name: Smoke test worker import
        working-directory: backend
        run: python -c "import worker; print('worker import ok')"
