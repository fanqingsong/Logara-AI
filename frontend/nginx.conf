server {
  listen 80;
  server_name _;

  # Docker embedded DNS; defer upstream resolution until request time.
  resolver 127.0.0.11 valid=10s ipv6=off;

  root /usr/share/nginx/html;
  index index.html;

  # Insight Engine routes proxied to insight-engine:8001.
  # /explain  — RAG root-cause analysis.
  # /insight/search — semantic log search (namespaced to avoid clash with backend /search).
  location ~ ^/(explain|insight)(/|$) {
    set $insight_upstream http://insight-engine:8001;
    proxy_pass $insight_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  # Backend API routes.
  location ~ ^/(logs|ingest|search|health|metrics|v1|api)(/|$) {
    set $backend_upstream http://backend:8000;
    proxy_pass $backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WizMap static widget (self-hosted under /wizmap/).
  location /wizmap/ {
    try_files $uri $uri/ /wizmap/index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
