# Dev overrides: hot reload for backend, log-processor, and frontend (Vite).
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    user: "0:0"
    volumes:
      - ./backend:/app
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  log-processor:
    user: "0:0"
    volumes:
      - ./backend:/app
    command: ["python", "worker.py"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5174:5174"
    environment:
      VITE_BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:5174/ || exit 1",
        ]

volumes:
  frontend_node_modules:
